<!DOCTYPE html>
<html>
<head>
    <title>Login Debug</title>
</head>
<body>
    <h1>Login Debug Test</h1>
    <button onclick="testLogin()">Test Login</button>
    <div id="result"></div>
    
    <script>
        async function testLogin() {
            const resultDiv = document.getElementById('result');
            
            try {
                const response = await fetch('http://localhost:8000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json',
                    },
                    body: JSON.stringify({
                        username: 'admin',
                        password: '1234'
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    // Store token
                    localStorage.setItem('token', data.data.token);
                    
                    resultDiv.innerHTML = `
                        <h3>Login Successful!</h3>
                        <p>Token: ${data.data.token.substring(0, 50)}...</p>
                        <p>User: ${data.data.user.username} (${data.data.user.role})</p>
                        <p>Is Admin: ${data.data.user.is_admin}</p>
                        <button onclick="testDashboard()">Test Dashboard Access</button>
                    `;
                } else {
                    resultDiv.innerHTML = `<p style="color: red;">Login failed: ${data.message}</p>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        }
        
        async function testDashboard() {
            const token = localStorage.getItem('token');
            const resultDiv = document.getElementById('result');
            
            try {
                const response = await fetch('http://localhost:8000/api/dashboard', {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/json',
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    resultDiv.innerHTML += `<p style="color: green;">Dashboard access OK!</p>`;
                } else {
                    const data = await response.json();
                    resultDiv.innerHTML += `<p style="color: red;">Dashboard access failed: ${data.message}</p>`;
                }
            } catch (error) {
                resultDiv.innerHTML += `<p style="color: red;">Dashboard error: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
