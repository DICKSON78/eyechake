services:
  # PHP Application with built-in server
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: eyechake_app
    restart: unless-stopped
    working_dir: /var/www
    ports:
      - "8074:8074"
    volumes:
      - ./:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
      - php_vendor:/var/www/vendor
      - php_storage:/var/www/storage
    command: php artisan serve --host=0.0.0.0 --port=8074
    environment:
      - DB_HOST=db
      - DB_DATABASE=sikaf
      - DB_USERNAME=isaac
      - DB_PASSWORD=Isaac@2025
      - QUEUE_CONNECTION=database
      - CACHE_DRIVER=file
      - SESSION_DRIVER=file
      - COMPOSER_MEMORY_LIMIT=-1
    networks:
      - eyechake-network
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php -v || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # MySQL Database
  db:
    image: mysql:8.0
    container_name: eyechake_db
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --max_allowed_packet=512M
    environment:
      MYSQL_DATABASE: sikaf
      MYSQL_USER: isaac
      MYSQL_PASSWORD: Isaac@2025
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_ALLOW_EMPTY_PASSWORD: "no"
    ports:
      - "3307:3307"
    volumes:
      - dbdata:/var/lib/mysql
      - ./sikaf.sql:/docker-entrypoint-initdb.d/init.sql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - eyechake-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Soketi WebSocket Server
  soketi:
    image: quay.io/soketi/soketi:latest-16-debian
    pull_policy: missing
    container_name: eyechake_soketi
    restart: unless-stopped
    ports:
      - "6001:6001"
      - "9601:9601"
    volumes:
      - ./soketi.json:/app/config.json
    command: node /app/bin/server.js start --config=/app/config.json
    networks:
      - eyechake-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9601/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # Queue Worker
  queue:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: eyechake_queue
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - php_vendor:/var/www/vendor
      - php_storage:/var/www/storage
    command: php artisan queue:work database --sleep=3 --tries=3 --max-time=3600 --timeout=60
    environment:
      - DB_HOST=db
      - DB_DATABASE=sikaf
      - DB_USERNAME=isaac
      - DB_PASSWORD=Isaac@2025
      - QUEUE_CONNECTION=database
      - CACHE_DRIVER=file
      - SESSION_DRIVER=file
    networks:
      - eyechake-network
    depends_on:
      app:
        condition: service_healthy
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "artisan", "queue:monitor"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 60s

  # Frontend Build Service
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.node
    container_name: eyechake_frontend
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - node_modules:/var/www/node_modules
    command: sh -c "npm ci --legacy-peer-deps && npm run build"
    networks:
      - eyechake-network
    profiles:
      - build
    
  # Node.js for development with hot reload
  node:
    build:
      context: .
      dockerfile: docker/Dockerfile.node
    container_name: eyechake_node
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - node_modules:/var/www/node_modules
    command: sh -c "npm ci --legacy-peer-deps && npm run dev"
    ports:
      - "5173:5173"
    networks:
      - eyechake-network
    profiles:
      - development
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5173"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Laravel Scheduler (runs every minute)
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: eyechake_scheduler
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - php_vendor:/var/www/vendor
      - php_storage:/var/www/storage
    command: sh -c 'while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done'
    environment:
      - DB_HOST=db
      - DB_DATABASE=sikaf
      - DB_USERNAME=isaac
      - DB_PASSWORD=Isaac@2025
      - QUEUE_CONNECTION=database
      - CACHE_DRIVER=file
      - SESSION_DRIVER=file
    networks:
      - eyechake-network
    depends_on:
      app:
        condition: service_healthy
      db:
        condition: service_healthy

networks:
  eyechake-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
  php_vendor:
    driver: local
  php_storage:
    driver: local
  node_modules:
    driver: local
