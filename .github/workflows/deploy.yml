name: Deploy to Production

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 62.171.159.62
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /root/eyechake
            git pull origin master
            docker compose build --no-cache
            docker compose up -d
            sleep 15
            docker compose --profile build build --no-cache frontend
            docker compose --profile build up frontend
            docker compose exec app php artisan migrate --force
            docker compose exec app php artisan db:seed --class=ProductionSeedDataSeeder --force
            docker compose exec app php artisan cache:clear
            docker compose exec app php artisan config:clear
            docker compose exec app php artisan route:clear
            docker compose exec app php artisan view:clear
            docker compose exec app php artisan config:cache
            docker compose exec app php artisan route:cache
            docker compose exec app php artisan view:cache
            docker compose exec app chown -R www-data:www-data /var/www
            docker compose exec app chmod -R 755 /var/www
            docker compose exec app chmod -R 777 /var/www/storage
            docker compose exec app chmod -R 777 /var/www/bootstrap/cache
            docker compose restart
            sleep 20
            echo "✅ Deployment complete!"
