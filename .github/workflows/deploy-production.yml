name: Deploy to Production

on:
  push:
    branches: [master]
  workflow_dispatch: # Manual trigger for safety

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 62.171.159.62
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /root/eyechake

            # Pull latest changes
            git stash push -m "Stash local changes before pull"
            git pull origin master
            git stash pop || echo "No stash to pop or conflicts resolved"

            # Use production environment
            cp .env.server .env

            # Install/update dependencies
            composer install --no-dev --optimize-autoloader
            npm install --legacy-peer-deps --production
            npm run build

            # Clear and optimize caches
            php artisan cache:clear
            php artisan config:clear
            php artisan route:clear
            php artisan view:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan queue:restart

            # Set permissions
            chown -R www-data:www-data /var/www/storage
            chmod -R 755 /var/www/storage
            chmod -R 755 /var/www/bootstrap/cache

            # Database operations - ONLY MIGRATIONS (NO SEEDERS TO PROTECT USER DATA)
            docker compose exec app php artisan migrate --force
            # ⚠️  SEEDERS DISABLED - They overwrite existing user data and privileges
            # docker compose exec app php artisan db:seed --class=ProductionSeedDataSeeder --force

            # Restart services to apply changes
            docker compose restart app

            echo "✅ Deployment completed successfully!"
