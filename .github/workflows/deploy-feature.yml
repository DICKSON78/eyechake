name: Deploy Feature Branch to Test Server

on:
  push:
    branches: [feature/security-rbac-improvements]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 62.171.159.62
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /root/eyechake

            # Switch to feature branch
            git checkout feature/security-rbac-improvements
            git pull origin feature/security-rbac-improvements

            # Use test environment
            cp .env.local .env

            # Install/update dependencies
            composer install --no-dev --optimize-autoloader
            npm install --legacy-peer-deps --production
            npm run build

            # Database operations (handled by Docker entrypoint)

            # Clear caches
            php artisan cache:clear
            php artisan config:clear
            php artisan route:clear
            php artisan view:clear

            # Set permissions
            chown -R www-data:www-data /var/www
            chmod -R 755 /var/www
            chmod -R 777 /var/www/storage
            chmod -R 777 /var/www/bootstrap/cache

            # Restart services
            docker compose build --no-cache
            docker compose up -d

            # Wait for container to be ready
            sleep 20

            # Run seeder if needed
            docker exec eyechake_app php artisan db:seed --class=ProductionSeedDataSeeder --force || echo "Seeding skipped or failed"

            echo "✅ Feature branch deployed to test server!"
            echo "🌐 Test at: http://62.171.159.62:8074"
            echo "🔧 Branch: feature/security-rbac-improvements"
